name: Deploy to Production

on:
  push:
    branches: [main]

# Only one deploy at a time — cancel in-flight if a new push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: false  # Let in-flight deploys finish; queue the next

jobs:

  # ── Gate: all CI checks must pass ─────────────────────────────────────────────
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        run: echo "CI passed — proceeding with deploy"

  # ── Build & Push Docker Image ─────────────────────────────────────────────────
  build-push:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: ci-gate
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/uae-einvoicing-backend
          tags: |
            type=sha,prefix=git-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}

  # ── Deploy Backend to EC2 ────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (EC2)
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -euo pipefail

            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/uae-einvoicing-backend:git-$(echo '${{ github.sha }}' | cut -c1-7)"
            COMPOSE_FILE=~/einvoicing/docker/docker-compose.prod.yml

            echo "==> Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "==> Cleaning up old images"
            pip cache purge 2>/dev/null || true
            sudo journalctl --vacuum-size=50M 2>/dev/null || true
            docker image prune -f --filter "until=24h" 2>/dev/null || true

            echo "==> Updating docker-compose image reference"
            cd ~/einvoicing
            git fetch origin main
            git reset --hard origin/main

            # Override image tag for this deploy
            export BACKEND_IMAGE="$IMAGE"

            echo "==> Running migrations"
            docker compose -f "$COMPOSE_FILE" run --rm \
              -e DJANGO_SETTINGS_MODULE=config.settings.production \
              backend python manage.py migrate --noinput

            echo "==> Collecting static files"
            docker compose -f "$COMPOSE_FILE" run --rm \
              backend python manage.py collectstatic --noinput --clear

            echo "==> Rolling restart (zero-downtime)"
            docker compose -f "$COMPOSE_FILE" up -d --no-deps --pull always backend
            sleep 5
            docker compose -f "$COMPOSE_FILE" up -d --no-deps celery-worker celery-beat flower

            echo "==> Health check"
            for i in 1 2 3 4 5; do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8000/health/ || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Backend healthy (attempt $i)"
                break
              fi
              echo "Attempt $i: status=$STATUS — waiting 10s..."
              sleep 10
              if [ "$i" = "5" ]; then
                echo "❌ Health check failed after 5 attempts"
                docker compose -f "$COMPOSE_FILE" logs --tail=50 backend
                exit 1
              fi
            done

            echo "✅ Backend deployed: $IMAGE"

  # ── Deploy Frontend ───────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production

    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -euo pipefail

            # ── Disk cleanup ──────────────────────────────────────────────────
            sudo apt-get clean -y 2>/dev/null || true
            find ~/einvoicing/frontend -type d -name ".next" -maxdepth 2 | \
              head -5 | xargs rm -rf 2>/dev/null || true

            # ── Pull latest code ──────────────────────────────────────────────
            cd ~/einvoicing
            git fetch origin main
            git reset --hard origin/main

            # ── Build Next.js ─────────────────────────────────────────────────
            cd ~/einvoicing/frontend
            npm ci --prefer-offline
            NEXT_TELEMETRY_DISABLED=1 npm run build

            # ── Restart via PM2 ───────────────────────────────────────────────
            pm2 restart einvoicing-frontend 2>/dev/null || \
              pm2 start npm --name einvoicing-frontend -- start
            pm2 save

            # ── Health check ──────────────────────────────────────────────────
            sleep 5
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Frontend healthy (status=$STATUS)"
            else
              echo "⚠️  Frontend returned status=$STATUS — check PM2 logs"
              pm2 logs einvoicing-frontend --lines 30
            fi

            echo "✅ Frontend deployed: SHA=${{ github.sha }}"

  # ── Post-Deploy Notification ──────────────────────────────────────────────────
  notify:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Report deploy status
        run: |
          BACKEND="${{ needs.deploy-backend.result }}"
          FRONTEND="${{ needs.deploy-frontend.result }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          echo "## Deploy Summary"
          echo "SHA: $SHORT_SHA"
          echo "Backend:  $BACKEND"
          echo "Frontend: $FRONTEND"

          if [ "$BACKEND" = "success" ] && [ "$FRONTEND" = "success" ]; then
            echo "✅ Full deployment successful"
          else
            echo "❌ Deployment had failures — check job logs"
            exit 1
          fi
