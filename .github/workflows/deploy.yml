name: Deploy to Production

on:
  push:
    branches: [main]

# One deploy at a time — queue the next, don't cancel in-flight
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:

  # ── Gate: CI must pass before deploy ──────────────────────────────────────────
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: CI passed
        run: echo "CI passed — proceeding with deploy"

  # ── Detect which services changed ─────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: ci-gate
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
      nginx: ${{ steps.changes.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed paths
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          BACKEND=false
          FRONTEND=false
          NGINX=false

          echo "$CHANGED" | grep -qE "^(apps/|config/|services/|tasks/|requirements|docker/Dockerfile)" && BACKEND=true || true
          echo "$CHANGED" | grep -qE "^frontend/" && FRONTEND=true || true
          echo "$CHANGED" | grep -qE "^docker/nginx\.conf" && NGINX=true || true

          echo "backend=$BACKEND"   >> $GITHUB_OUTPUT
          echo "frontend=$FRONTEND" >> $GITHUB_OUTPUT
          echo "nginx=$NGINX"       >> $GITHUB_OUTPUT

          echo "Backend:  $BACKEND | Frontend: $FRONTEND | Nginx: $NGINX"

  # ── Deploy to Hostinger VPS ───────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: detect-changes
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -euo pipefail

            DEPLOY_DIR=~/E-Invoiceing-for-ASP
            COMPOSE="docker compose -f $DEPLOY_DIR/docker/docker-compose.prod.yml"
            BACKEND_CHANGED="${{ needs.detect-changes.outputs.backend }}"
            FRONTEND_CHANGED="${{ needs.detect-changes.outputs.frontend }}"
            NGINX_CHANGED="${{ needs.detect-changes.outputs.nginx }}"

            echo "============================================"
            echo "  Deploy SHA: $(echo '${{ github.sha }}' | cut -c1-7)"
            echo "  Backend:  $BACKEND_CHANGED"
            echo "  Frontend: $FRONTEND_CHANGED"
            echo "  Nginx:    $NGINX_CHANGED"
            echo "============================================"

            # ── Pull latest code ──────────────────────────────────────────────
            echo "==> Pulling latest code"
            cd $DEPLOY_DIR
            git fetch origin main
            git reset --hard origin/main

            # ── Backend ───────────────────────────────────────────────────────
            if [ "$BACKEND_CHANGED" = "true" ]; then
              echo "==> Rebuilding backend image"
              $COMPOSE up -d --build --no-deps backend

              echo "==> Running migrations"
              $COMPOSE exec -T backend python manage.py migrate --noinput

              echo "==> Collecting static files"
              $COMPOSE exec -T backend python manage.py collectstatic --noinput --clear

              echo "==> Restarting Celery workers"
              $COMPOSE up -d --build --no-deps celery-worker celery-beat
            else
              echo "==> No backend changes — skipping rebuild"
            fi

            # ── Frontend ──────────────────────────────────────────────────────
            if [ "$FRONTEND_CHANGED" = "true" ]; then
              echo "==> Rebuilding frontend image"
              $COMPOSE up -d --build --no-deps frontend
            else
              echo "==> No frontend changes — skipping rebuild"
            fi

            # ── Nginx ─────────────────────────────────────────────────────────
            if [ "$NGINX_CHANGED" = "true" ]; then
              echo "==> Reloading nginx config"
              $COMPOSE exec -T nginx nginx -s reload
            fi

            # ── Health check ──────────────────────────────────────────────────
            echo "==> Health check"
            for i in 1 2 3 4 5 6; do
              STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                --max-time 10 https://api.e-numerak.com/health/ || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ Healthy (attempt $i, status=$STATUS)"
                break
              fi
              echo "Attempt $i: status=$STATUS — waiting 10s..."
              sleep 10
              if [ "$i" = "6" ]; then
                echo "❌ Health check failed after 6 attempts"
                $COMPOSE logs --tail=60 backend
                exit 1
              fi
            done

            # ── Prune old Docker images ───────────────────────────────────────
            docker image prune -f --filter "until=48h" 2>/dev/null || true

            echo "✅ Deploy complete: $(echo '${{ github.sha }}' | cut -c1-7)"

  # ── Post-Deploy Summary ───────────────────────────────────────────────────────
  notify:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Report status
        run: |
          STATUS="${{ needs.deploy.result }}"
          SHA="${{ github.sha }}"

          echo "## Deploy Summary"
          echo "SHA:    ${SHA:0:7}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Status: $STATUS"

          if [ "$STATUS" = "success" ]; then
            echo "✅ Production deploy successful"
            echo "   https://e-numerak.com"
            echo "   https://api.e-numerak.com/health/"
          else
            echo "❌ Deploy failed — check job logs above"
            exit 1
          fi
