## phoss SMP configuration — E-Numerak (UAE PINT-AE, TEST environment)
## Reference: https://github.com/phax/phoss-smp/wiki/Configuration
##
## NOTE: replace CHANGE_ME_P12_PASSWORD with the export password you set when
## creating smp-keystore.p12.

# ── Environment ───────────────────────────────────────────────────────────────
# Test environment → production mode OFF.
global.production = false
global.debug      = false

# ── Backend: XML (no external database) ────────────────────────────────────────
smp.backend = xml
# Persist the XML data (service groups + endpoints) on the mounted volume so it
# survives container restarts.
smp.datapath = /config/data

# ── Public URL (outside-facing HTTPS URL; must NOT end with /public) ───────────
smp.publicurl = https://smp.e-numerak.com
# Running behind an nginx reverse proxy that terminates TLS.
smp.forceroot = true

# ── Peppol identifiers (Peppol scheme; supports wildcard PINT doctypes) ────────
smp.identifiertype = peppol
smp.rest.type      = peppol

# ── SMP keystore (your G3 SMP TEST certificate) ───────────────────────────────
smp.keystore.type         = PKCS12
smp.keystore.path         = /config/smp-keystore.p12
smp.keystore.password     = CHANGE_ME_P12_PASSWORD
smp.keystore.key.alias    = smp
smp.keystore.key.password = CHANGE_ME_P12_PASSWORD

# ── SML / SMK (TEST) ───────────────────────────────────────────────────────────
# Keep SML disabled for the first boot. After logging into the SMP web UI you
# register the SMP to the SMK (test SML) using the built-in tool, then you may
# flip this to true. The SML endpoint itself is chosen in the UI, not here.
sml.enabled = false
sml.required = true
sml.smpid   = ENUMERAK-SMP-TEST
