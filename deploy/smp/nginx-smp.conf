# nginx reverse proxy for phoss SMP — smp.e-numerak.com
# Place at: /etc/nginx/sites-available/smp.e-numerak.com  (symlink into sites-enabled)
# TLS certs are issued by certbot (Let's Encrypt) — see README.

server {
    listen 80;
    listen [::]:80;
    server_name smp.e-numerak.com;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name smp.e-numerak.com;

    ssl_certificate     /etc/letsencrypt/live/smp.e-numerak.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smp.e-numerak.com/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://127.0.0.1:8888;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
