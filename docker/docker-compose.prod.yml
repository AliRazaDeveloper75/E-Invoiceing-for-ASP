# ─── UAE E-Invoicing Platform — Production Docker Compose ─────────────────────
#
# Domains:
#   e-numerak.com        → Next.js frontend
#   api.e-numerak.com    → Django API
#
# Usage:
#   docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Required: .env.prod in project root (copy from .env.prod.example)

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ../.env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U einvoicing -d einvoicing_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-changeme_in_prod}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-changeme_in_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: runtime
    image: einvoicing-backend:prod
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class gthread --threads 2 --timeout 120 --access-logfile - --error-logfile -
    env_file:
      - ../.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - /etc/peppol:/etc/peppol:ro          # AS4 signing keystore (.p12)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: runtime
    image: einvoicing-backend:prod
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --queues=invoice_processing,celery --concurrency=4 --max-tasks-per-child=100
    env_file:
      - ../.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - media_files:/app/media
      - /etc/peppol:/etc/peppol:ro          # AS4 signing keystore (.p12)
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Celery Beat ───────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: runtime
    image: einvoicing-backend:prod
    restart: unless-stopped
    command: celery -A config beat --loglevel=info
    env_file:
      - ../.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.e-numerak.com
    image: einvoicing-frontend:prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Nginx (SSL termination + reverse proxy) ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Flower (Celery Monitor — port 5555, internal only) ────────────────────────
  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: runtime
    image: einvoicing-backend:prod
    restart: unless-stopped
    command: celery -A config flower --port=5555 --basic-auth=${FLOWER_ADMIN_USER:-admin}:${FLOWER_ADMIN_PASSWORD:-changeme}
    env_file:
      - ../.env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    healthcheck:
      disable: true
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
  certbot_www:
    driver: local
  nginx_logs:
    driver: local
