<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="white" fill-opacity="0.03"/>
  <circle cx="150" cy="530" r="150" fill="white" fill-opacity="0.03"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="80" height="80" rx="18" fill="#3b82f6"/>
  <text x="120" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle">E</text>

  <!-- Brand name -->
  <text x="80" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">E-Numerak</text>

  <!-- Accent line -->
  <rect x="80" y="280" width="160" height="5" rx="3" fill="#3b82f6"/>

  <!-- Tagline -->
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">UAE FTA-Compliant E-Invoicing Platform</text>

  <!-- Description -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748b">Generate · Validate · Submit to FTA via PEPPOL BIS 3.0</text>

  <!-- Badges -->
  <rect x="80" y="480" width="160" height="48" rx="8" fill="white" fill-opacity="0.08"/>
  <text x="160" y="511" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#93c5fd" text-anchor="middle">FTA Certified</text>

  <rect x="258" y="480" width="160" height="48" rx="8" fill="white" fill-opacity="0.08"/>
  <text x="338" y="511" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#93c5fd" text-anchor="middle">PEPPOL BIS 3.0</text>

  <rect x="436" y="480" width="130" height="48" rx="8" fill="white" fill-opacity="0.08"/>
  <text x="501" y="511" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#93c5fd" text-anchor="middle">UBL 2.1</text>

  <rect x="584" y="480" width="180" height="48" rx="8" fill="white" fill-opacity="0.08"/>
  <text x="674" y="511" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#93c5fd" text-anchor="middle">VAT Compliant</text>

  <!-- Domain -->
  <text x="1120" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#475569" text-anchor="end">e-numerak.com</text>
</svg>
